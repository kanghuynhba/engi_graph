version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/engigraph.db
      - VECTOR_STORE=chroma
      - EMBEDDER=dummy
      - LLM_PROVIDER=dummy
      - MAX_ARTICLE_WORKERS=5
      - MAX_DB_WRITERS=1

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
